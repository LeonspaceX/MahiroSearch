name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"
  APP_NAME: "MahiroSearch"

jobs:
  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: x64

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build application
        run: python build_windows.py

      - name: Archive build output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive `
            -Path dist\${{ env.APP_NAME }}.exe `
            -DestinationPath release\${{ env.APP_NAME }}-windows-x86_64.zip `
            -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mahirosearch-windows-x86_64
          path: release/${{ env.APP_NAME }}-windows-x86_64.zip
          if-no-files-found: error

  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: x64

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0 libxcb-xinerama0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build application
        run: python build_linux.py

      - name: Archive build output
        run: |
          mkdir -p release
          tar -czf release/${{ env.APP_NAME }}-linux-x86_64.tar.gz -C dist ${{ env.APP_NAME }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mahirosearch-linux-x86_64
          path: release/${{ env.APP_NAME }}-linux-x86_64.tar.gz
          if-no-files-found: error

  build-macos:
    name: Build macOS arm64
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build application
        run: python build_macos.py

      - name: Archive build output
        run: |
          mkdir -p release
          if [ -d "dist/${{ env.APP_NAME }}.app" ]; then
            ditto -c -k --sequesterRsrc --keepParent "dist/${{ env.APP_NAME }}.app" "release/${{ env.APP_NAME }}-macos-arm64.zip"
          elif [ -f "dist/${{ env.APP_NAME }}" ]; then
            ditto -c -k "dist/${{ env.APP_NAME }}" "release/${{ env.APP_NAME }}-macos-arm64.zip"
          else
            echo "No macOS build output found in dist/"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mahirosearch-macos-arm64
          path: release/${{ env.APP_NAME }}-macos-arm64.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
      - build-macos

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Extract latest changelog
        run: |
          awk '/^## \[/{if(p) exit; p=1} p' CHANGELOG.md > latest_changelog.txt

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mahirosearch-*
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: latest_changelog.txt
          files: release-assets/**/*
          fail_on_unmatched_files: true